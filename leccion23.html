<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>HTML Table Padding</title>

<style>

table{
border-spacing:10px;
}

table,th,td{
border:1px solid black;
}

th,td{
padding:12px;
}

</style>

</head>

<body>

<h1>Padding y Spacing</h1>

<table>

<tr>
<th>Materia</th>
<th>Día</th>
</tr>

<tr>
<td>HTML</td>
<td>Sábado</td>
</tr>

<tr>
<td>CSS</td>
<td>Domingo</td>
</tr>

</table>

</body>
<p>Prueba Git</p>
</html>
